<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      overflow: hidden;
    }
    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background-color: #343a40;
      color: white;
    }
    .content-wrapper {
      margin-left: 220px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topnav {
      height: 60px;
      flex-shrink: 0;
    }
    .main-content {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      background-color: #f8f9fa;
    }
  </style>
</head>
<body>

  <!-- LEFT SIDEBAR -->
  <nav class="sidebar d-flex flex-column p-3">
    <h4 class="text-white mb-4">Menu</h4>
    <ul class="nav nav-pills flex-column">
      <li class="nav-item mb-2"><a href="#" class="nav-link text-white">Item 1</a></li>
      <li class="nav-item mb-2"><a href="#" class="nav-link text-white">Item 2</a></li>
      <li class="nav-item mb-2"><a href="#" class="nav-link text-white">Item 3</a></li>
    </ul>
  </nav>

  <!-- RIGHT SIDE (TOP NAV + MAIN CONTENT) -->
  <div class="content-wrapper">

    <!-- TOP NAV -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light topnav px-3">
      <a class="navbar-brand" href="#">Top Nav</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <h2>Dashboard Area</h2>
      <p>This is the main content area beneath the top nav and to the right of the left sidebar.</p>
    </div>

  </div>

</body>
</html>
